<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO 对战看板 · 预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b12;
  --panel:rgba(16,23,33,.88);
  --panel-2:rgba(20,29,42,.78);
  --edge:rgba(120,170,220,.16);
  --text:#e8f0fa;
  --dim:#b0bed4;
  --faint:#8898b5;
  --me:#38bdf8;
  --me-deep:#0284c7;
  --opp:#fb7185;
  --opp-deep:#e11d48;
  --hp-hi:#4ade80;
  --hp-mid:#facc15;
  --hp-lo:#f87171;
  --up:#f59e0b;
  --down:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:transparent}
body{font-family:"Noto Sans SC","Chakra Petch",sans-serif;color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center}

.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(120,170,220,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,220,.04) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(ellipse 85% 75% at 50% 50%,#000 35%,transparent 100%)}

.hud{position:relative;z-index:5;display:flex;gap:14px;padding:14px;align-items:stretch;width:100%;max-width:100vw;box-sizing:border-box}
.col{display:flex;flex-direction:column;gap:10px;min-height:0}
.po-col{flex:1 1 auto;min-width:0}
.info-col{flex:0 0 460px}

/* PO 占位 21:9 */
.po-frame{width:100%;aspect-ratio:21/9;flex:0 0 auto;position:relative;border:1.5px dashed rgba(120,170,220,.22);border-radius:14px;background:linear-gradient(135deg,rgba(15,23,34,.7),rgba(10,16,24,.7));display:flex;align-items:center;justify-content:center;overflow:hidden}
.po-frame::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(120,170,220,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,220,.025) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.po-corner{position:absolute;width:20px;height:20px;border:2px solid var(--me);opacity:.45}
.po-corner.tl{top:12px;left:12px;border-right:none;border-bottom:none;border-radius:4px 0 0 0}
.po-corner.tr{top:12px;right:12px;border-left:none;border-bottom:none;border-radius:0 4px 0 0}
.po-corner.bl{bottom:12px;left:12px;border-right:none;border-top:none;border-radius:0 0 0 4px}
.po-corner.br{bottom:12px;right:12px;border-left:none;border-top:none;border-radius:0 0 4px 0}
.po-label{text-align:center;color:var(--faint);position:relative;z-index:1}
.po-l1{font-family:"Chakra Petch";font-size:20px;letter-spacing:.32em;font-weight:600;color:var(--dim)}
.po-l2{font-size:12px;letter-spacing:.18em;margin-top:5px}
.po-l3{font-family:"Chakra Petch";font-size:11px;letter-spacing:.2em;margin-top:10px;color:var(--faint);opacity:.6}

/* zone 通用 */
.zone{background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:8px 12px;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.z2,.z3{flex:0 0 auto}
.z1{flex:0.9 1 0;min-height:0}
.z4{flex:1.6 1 0;min-height:0}

/* z2/z3 场上卡（左信息 + 右招式）*/
.field-card{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;flex:0 0 auto}
.fc-left{display:flex;flex-direction:column;gap:5px;min-width:0}
.fc-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.f-name{font-size:17px;font-weight:700;line-height:1}
.f-lv{font-family:"Chakra Petch";font-size:13px;color:var(--dim)}
.type-chip{font-size:11px;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;text-shadow:0 1px 1px rgba(0,0,0,.4);line-height:1.3}
.hp-bar{flex:0 0 120px;width:120px;height:9px;border-radius:5px;background:rgba(0,0,0,.5);box-shadow:inset 0 1px 2px rgba(0,0,0,.6);overflow:hidden;position:relative}
.hp-fill{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:5px;background:linear-gradient(180deg,var(--hp-h),var(--hp-l));transition:width 1s cubic-bezier(.22,1,.36,1)}
.hp-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);background-size:50px 100%;animation:shine 2.8s linear infinite}
@keyframes shine{from{background-position:-50px 0}to{background-position:200px 0}}
.hp-num{font-family:"Chakra Petch";font-size:12px;color:var(--dim);white-space:nowrap}
.hp-num b{color:var(--text);font-weight:600}
.hp-pct{font-family:"Chakra Petch";font-weight:700;font-size:14px}
.boosts{display:flex;flex-wrap:nowrap;gap:4px;overflow:hidden}
.boost{font-family:"Chakra Petch";font-size:11px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.02em;flex:0 0 auto;white-space:nowrap}
.boost.up{background:rgba(245,158,11,.18);color:var(--up);border:1px solid rgba(245,158,11,.4)}
.boost.down{background:rgba(96,165,250,.18);color:var(--down);border:1px solid rgba(96,165,250,.4)}
.boost.zero{color:var(--faint);background:rgba(120,150,180,.05);border:1px solid rgba(120,150,180,.1)}
.st-dot{width:15px;height:15px;border-radius:50%;font-size:10px;font-weight:700;color:#fff;display:inline-flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.fc-moves{display:flex;gap:8px;align-items:stretch}
.movecell{display:flex;flex-direction:column;gap:2px;min-width:62px;padding:3px 5px;border-radius:4px;background:rgba(0,0,0,.2)}
.mc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
.mc-bot{display:flex;align-items:center;gap:4px;font-size:11px}
.fc-empty{min-width:200px;min-height:50px;border:1px dashed rgba(120,150,180,.15);border-radius:5px}

/* z2/z3 6只卡片网格 */
.pcards{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:6px;flex:1;min-height:0}
.pcard{display:flex;flex-direction:column;gap:4px;padding:5px 7px;border-radius:6px;background:rgba(0,0,0,.2);min-width:0;overflow:hidden}
.pcard.active{box-shadow:0 0 0 1px var(--me) inset}
.pcard.opp-active{box-shadow:0 0 0 1px var(--opp) inset}
.pcard.ko{opacity:.7;filter:grayscale(.4);background:rgba(248,113,113,.16)}
.pcard.unknown{border:1px dashed rgba(120,150,180,.18);background:rgba(0,0,0,.1)}
.pc-head{display:flex;align-items:center;gap:5px;flex:0 0 auto}
.pc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto}
.pc-hpbar{flex:1;height:5px;border-radius:3px;background:rgba(0,0,0,.5);overflow:hidden;min-width:30px}
.pc-hpbar i{display:block;height:100%;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.pc-pct{font-family:"Chakra Petch";font-size:11px;font-weight:700;flex-shrink:0}
.pc-moves{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0}
.pc-moverow{display:flex;align-items:center;gap:4px;font-size:10px}
.pc-moverow .mtype{height:13px;min-width:18px;font-size:8px}
.pc-moverow .mname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-moverow .mpp{font-family:"Chakra Petch";font-size:9px;color:var(--dim)}
.pc-empty-moves{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:10px;font-style:italic}
.move{display:flex;align-items:center;gap:5px;font-size:12px;min-width:0}
.mtype{flex-shrink:0;min-width:22px;height:16px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.4);padding:0 3px}
.mname{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mpp{font-family:"Chakra Petch";font-size:11px;color:var(--dim);margin-left:auto}
.mpp.low{color:var(--up)}

/* z1 对手6只 竖排 */
.team-list{display:flex;flex-direction:column;gap:4px;flex:1;min-height:0;overflow:hidden}
.team-row{display:grid;grid-template-columns:86px 1fr 48px 18px;gap:8px;align-items:center;padding:5px 8px;border-radius:6px;background:rgba(0,0,0,.2);min-height:0}
.team-row.active{box-shadow:0 0 0 1px var(--opp) inset,0 0 8px rgba(251,113,133,.15)}
.team-row.unknown{border:1px dashed rgba(120,150,180,.18);background:rgba(0,0,0,.1)}
.team-row.ko{opacity:.7;filter:grayscale(.4);background:rgba(248,113,113,.16)}
.team-row .tr-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.team-row .tr-hpbar{height:6px;border-radius:3px;background:rgba(0,0,0,.5);overflow:hidden}
.team-row .tr-hpbar i{display:block;height:100%;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.team-row .tr-pct{font-family:"Chakra Petch";font-size:12px;font-weight:700;text-align:right;white-space:nowrap}

/* z4 我方6只 竖排（带招式） */
.bench-list{display:flex;flex-direction:column;gap:4px;flex:1;min-height:0;overflow:hidden}
.bench-poke{display:grid;grid-template-columns:110px 1fr;gap:6px;padding:2px 6px;border-radius:6px;background:rgba(0,0,0,.2);align-items:center}
.bench-poke.active{box-shadow:0 0 0 1px var(--me) inset,0 0 8px rgba(56,189,248,.18)}
.bench-poke.ko{opacity:.7;filter:grayscale(.4);background:rgba(248,113,113,.16)}
.bp-left{display:flex;flex-direction:column;gap:2px;min-width:0}
.bp-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
.bp-hp{display:flex;align-items:center;gap:4px}
.bp-hpbar{flex:1;height:5px;border-radius:3px;background:rgba(0,0,0,.5);overflow:hidden}
.bp-hpbar i{display:block;height:100%;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bp-pct{font-family:"Chakra Petch";font-size:11px;font-weight:700}
.bp-moves{display:flex;gap:6px;align-items:center;min-width:0}
.bmv{display:inline-flex;align-items:center;justify-content:center;gap:3px;font-size:11px;min-width:0;flex:1 1 0}
.bmt{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.bmv .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

/* 分隔条：FOE 右上 / 中 Turn天气场地 / ME 左下 */
.divider{flex:0 0 auto;background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:8px 14px;display:flex;flex-direction:column;gap:6px}
.divider .d-top{display:flex;align-items:center;justify-content:flex-end;gap:10px;font-family:"Chakra Petch";font-size:14px;font-weight:700}
.divider .d-top .foe{color:var(--opp)}
.divider .d-mid{display:flex;align-items:center;justify-content:center;gap:18px;font-size:13px}
.divider .d-mid .turn{font-family:"Chakra Petch";font-weight:700;color:var(--text)}
.divider .d-mid .turn .lbl{font-size:11px;color:var(--dim);margin-right:5px;font-weight:600}
.divider .d-mid .k{font-family:"Chakra Petch";font-size:11px;color:var(--faint);margin-right:5px;font-weight:500}
.divider .d-mid .weather{color:var(--me);font-weight:600}
.divider .d-mid .terrain{color:#c4b5fd;font-weight:600}
.divider .d-bot{display:flex;align-items:center;justify-content:flex-start;gap:10px;font-family:"Chakra Petch";font-size:14px;font-weight:700}
.divider .d-bot .me{color:var(--me)}
.divider .side{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.divider .side .lbl{font-family:"Chakra Petch";font-size:10px;letter-spacing:.1em;color:var(--faint)}
.hazards{display:flex;gap:4px}
.hz{font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(120,150,180,.07);color:var(--faint);border:1px solid rgba(120,150,180,.1)}
.hz.on{color:#fff}
.hz.rock.on{background:rgba(168,85,247,.22);border-color:rgba(168,85,247,.45)}
.hz.spike.on{background:rgba(150,180,210,.22);border-color:rgba(150,180,210,.45)}
.hz.toxic.on{background:rgba(168,85,247,.28);border-color:rgba(168,85,247,.5)}
.hz.web.on{background:rgba(100,200,180,.22);border-color:rgba(100,200,180,.45)}

/* 控制 */
.controls{position:fixed;right:14px;bottom:10px;z-index:20;display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--panel);border:1px solid var(--edge);border-radius:8px;backdrop-filter:blur(8px)}
.ctrl-btn{font-family:"Chakra Petch";font-size:12px;font-weight:600;letter-spacing:.12em;color:var(--dim);background:transparent;border:1px solid var(--edge);border-radius:5px;padding:4px 10px;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{color:var(--text);border-color:var(--me);background:rgba(56,189,248,.1)}
.step-info{font-family:"Chakra Petch";font-size:12px;color:var(--dim);min-width:42px;text-align:center}
.preview-tag{position:fixed;left:14px;bottom:10px;z-index:20;font-family:"Chakra Petch";font-size:11px;letter-spacing:.2em;color:var(--faint);display:flex;align-items:center;gap:5px}
.preview-tag::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--me);box-shadow:0 0 6px var(--me);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<main class="hud">
  <div class="col po-col">
    <section class="zone z2" id="z2"></section>
    <div class="po-frame">
      <div class="po-corner tl"></div><div class="po-corner tr"></div>
      <div class="po-corner bl"></div><div class="po-corner br"></div>
      <div class="po-label">
        <div class="po-l1">PO 界面占位</div>
        <div class="po-l2">21 : 9 · 直播时叠加 PO 窗口于此</div>
        <div class="po-l3">PO BATTLE WINDOW</div>
      </div>
    </div>
    <section class="zone z3" id="z3"></section>
  </div>
  <div class="col info-col">
    <section class="zone z1" id="z1"></section>
    <div class="divider" id="divider"></div>
    <section class="zone z4" id="z4"></section>
  </div>
</main>
<div class="preview-tag">DEMO · SIMULATED</div>
<div class="controls">
  <button id="btnPlay" class="ctrl-btn">PAUSE</button>
  <button id="btnReplay" class="ctrl-btn">REPLAY</button>
  <span id="stepInfo" class="step-info">1 / 19</span>
</div>

<script>
// ===== 演示剧本：模拟一场对战从开局到终局 =====

      {name:"暴鲤龙",level:100,types:["Water","Flying"],hp:200,maxHp:200,hpPct:100,status:null,ko:false,
       moves:[{name:"攀瀑",type:"Water",power:80,pp:15,maxPp:15},{name:"冰之牙",type:"Ice",power:65,pp:15,maxPp:15},{name:"龙之舞",type:"Dragon",power:0,pp:20,maxPp:20},{name:"电磁波",type:"Electric",power:0,pp:20,maxPp:20}]},

};
var STEPS=[
  function(s){ s.turn=1; s.me.active.hp=230; s.me.active.hpPct=82; s.opp.active.hpPct=72; },
  function(s){ s.turn=2; s.me.active.boosts.atk=2; s.me.active.hp=190; s.me.active.hpPct=68; },

    s.opp.active={name:"水箭龟",level:100,types:["Water"],hpPct:100,status:null,boosts:{atk:0,def:0,spa:0,spd:0,spe:0,acc:0,eva:0},ability:"激流",item:null,moves:null};
    s.opp.bench=[{name:"喷火龙",revealed:true,ko:false,hpPct:30},{name:null,revealed:false,ko:false,hpPct:null},{name:null,revealed:false,ko:false,hpPct:null},{name:null,revealed:false,ko:false,hpPct:null},{name:null,revealed:false,ko:false,hpPct:null}];
  },
  function(s){ s.turn=5; s.opp.active.hpPct=65; s.me.active.hp=120; s.me.active.hpPct=43; },

function cloneState(o){ return JSON.parse(JSON.stringify(o)); }
var DEMO_SCRIPT=[cloneState(S0)];
STEPS.forEach(function(fn){ var s=cloneState(DEMO_SCRIPT[DEMO_SCRIPT.length-1]); fn(s); DEMO_SCRIPT.push(s); });

// ===== 映射表 =====
var TYPE_CN={Normal:"一般",Fire:"火",Water:"水",Electric:"电",Grass:"草",Ice:"冰",Fighting:"格斗",Poison:"毒",Ground:"地",Flying:"飞",Psychic:"超能",Bug:"虫",Rock:"岩",Ghost:"幽灵",Dragon:"龙",Dark:"恶",Steel:"钢",Fairy:"妖精"};
var TYPE_COLOR={Normal:"#A8A878",Fire:"#F08030",Water:"#6890F0",Electric:"#F8D030",Grass:"#78C850",Ice:"#98D8D8",Fighting:"#C03028",Poison:"#A040A0",Ground:"#E0C068",Flying:"#A890F0",Psychic:"#F85888",Bug:"#A8B820",Rock:"#B8A038",Ghost:"#705898",Dragon:"#7038F0",Dark:"#705848",Steel:"#B8B8D0",Fairy:"#EE99AC"};
var WEATHER={rain:{cn:"雨天"},sun:{cn:"晴天"},sandstorm:{cn:"沙暴"},hail:{cn:"冰雹"}};
var TERRAIN={electric:{cn:"电气场地"},psychic:{cn:"精神场地"},misty:{cn:"薄雾场地"},grassy:{cn:"草原场地"}};
var STATUS={burn:{cn:"烧",c:"#fb923c",bg:"rgba(251,146,60,.22)"},poison:{cn:"毒",c:"#a855f7",bg:"rgba(168,85,247,.22)"},badpoison:{cn:"毒",c:"#a855f7",bg:"rgba(168,85,247,.26)"},paralysis:{cn:"麻",c:"#fde047",bg:"rgba(253,224,71,.20)"},sleep:{cn:"睡",c:"#60a5fa",bg:"rgba(96,165,250,.20)"},freeze:{cn:"冰",c:"#67e8f9",bg:"rgba(103,232,249,.20)"},confusion:{cn:"乱",c:"#ec4899",bg:"rgba(236,72,153,.20)"}};
var BOOST_LABELS=[["atk","Atk"],["def","Def"],["spa","SpA"],["spd","SpD"],["spe","Spe"],["acc","Acc"],["eva","Eva"]];
function hpColors(p){return p>50?["#4ade80","#16a34a"]:p>25?["#facc15","#ca8a04"]:["#f87171","#dc2626"];}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function typeShort(t){return TYPE_CN[t]||t;}
function typeChip(t){ if(!t){return '<span class="type-chip" style="background:#6b7280">?</span>';} return '<span class="type-chip" style="background:'+(TYPE_COLOR[t]||'#6b7280')+'">'+typeShort(t)+'</span>';}
function statusDot(s){return s?'<span class="st-dot" style="background:'+STATUS[s].c+'">'+STATUS[s].cn+'</span>':'';}
function hazardsHtml(h){
  return '<div class="hazards">'+
    '<span class="hz rock'+(h.stealthRocks?' on':'')+'">岩'+(h.stealthRocks?'✓':'')+'</span>'+
    '<span class="hz spike'+(h.spikes?' on':'')+'">菱'+(h.spikes||'')+'</span>'+
    '<span class="hz toxic'+(h.toxicSpikes?' on':'')+'">毒'+(h.toxicSpikes||'')+'</span>'+
    '<span class="hz web'+(h.stickyWeb?' on':'')+'">网'+(h.stickyWeb?'✓':'')+'</span>'+
  '</div>';
}
function boostsHtml(b){
  return BOOST_LABELS.map(function(bl){
    var v=b[bl[0]];var cls=v>0?"up":v<0?"down":"zero";
    var txt=v>0?bl[1]+" +"+v:bl[1]+" "+v;
    return '<span class="boost '+cls+'">'+txt+'</span>';
  }).join("");
}
function moveHtml(m){
  var low=m.pp<=Math.max(1,Math.floor(m.maxPp*0.25))?' low':'';
  return '<div class="move">'+
    '<span class="mtype" style="background:'+(TYPE_COLOR[m.type]||'#6b7280')+'">'+(typeShort(m.type)||'?')+'</span>'+
    '<span class="mname">'+esc(m.name)+'</span>'+
    '<span class="mpp'+low+'">'+m.pp+'/'+m.maxPp+'</span>'+
  '</div>';
}
function moveMiniHtml(m){
  return '<span class="bmv"><i class="bmt" style="background:'+(TYPE_COLOR[m.type]||'#6b7280')+'"></i><span class="nm">'+esc(m.name)+'</span></span>';
}

// ===== 各区渲染 =====
// z2/z3 场上卡：左两行(名字Lv属性HP条血量 / 能力等级)，右4招横排(每格名+属性PP)
function fieldCardHtml(p, isMe){
  var hc=hpColors(p.hpPct);
  var nameColor = isMe ? '#eaf6ff' : '#ffeef1';
  var hpNum = isMe ? '<span class="hp-num"><b>'+p.hp+'</b>/'+p.maxHp+'</span>' : '';
  var movesHtml;
  if(isMe && p.moves){
    movesHtml = '<div class="fc-moves">'+p.moves.map(moveCellHtml).join('')+'</div>';
  } else {
    movesHtml = '<div class="fc-empty"></div>';
  }
  return '<div class="field-card">'+
    '<div class="fc-left">'+
      '<div class="fc-row1">'+
        '<span class="f-name" style="color:'+nameColor+'">'+esc(p.name)+'</span>'+
        '<span class="f-lv">L'+p.level+'</span>'+
        p.types.map(typeChip).join('')+
        statusDot(p.status)+
        '<div class="hp-bar"><div class="hp-fill" data-pct="'+p.hpPct+'" style="--hp-h:'+hc[0]+';--hp-l:'+hc[1]+'"></div></div>'+
        hpNum+
        '<span class="hp-pct" style="color:'+hc[0]+'">'+p.hpPct+'%</span>'+
      '</div>'+
      '<div class="boosts">'+boostsHtml(p.boosts)+'</div>'+
    '</div>'+
    movesHtml+
  '</div>';
}
function moveCellHtml(m){
  var low=m.pp<=Math.max(1,Math.floor(m.maxPp*0.25))?' low':'';
  return '<div class="movecell">'+
    '<div class="mc-name">'+esc(m.name)+'</div>'+
    '<div class="mc-bot"><span class="mtype" style="background:'+(TYPE_COLOR[m.type]||'#6b7280')+'">'+(typeShort(m.type)||'?')+'</span><span class="mpp'+low+'">'+m.pp+'/'+m.maxPp+'</span></div>'+
  '</div>';
}
// z2/z3 6只卡片网格的单卡片（名字+HP + 4招竖排；对手招式留空）
function pcCardHtml(p, isMe){
  var hc=hpColors(p.hpPct||0);
  var cls='pcard';
  if(p.active) cls += isMe?' active':' opp-active';
  if(p.ko) cls += ' ko';
  if(!p.revealed) cls += ' unknown';
  var bg=p.status?(' style="background:'+STATUS[p.status].bg+'"'):'';
  var name=p.name||'???';
  var head;
  if(!p.revealed){ head='<span class="pc-name" style="color:var(--faint)">???</span><span class="pc-pct" style="color:var(--faint);font-size:10px">未露</span>'; }
  else if(p.ko){ head='<span class="pc-name">'+esc(name)+'</span><span class="pc-pct" style="color:var(--faint)">KO</span>'; }
  else { head='<span class="pc-name">'+esc(name)+'</span><div class="pc-hpbar"><i data-pct="'+(p.hpPct||0)+'" style="background:'+hc[0]+'"></i></div><span class="pc-pct" style="color:'+hc[0]+'">'+p.hpPct+'%</span>'; }
  var moves;
  if(isMe && p.moves && !p.ko){
    moves='<div class="pc-moves">'+p.moves.map(pcMoveRowHtml).join('')+'</div>';
  } else {
    moves='<div class="pc-empty-moves">'+(isMe?'':'招式未知')+'</div>';
  }
  return '<div class="'+cls+'"'+bg+'><div class="pc-head">'+head+'</div>'+moves+'</div>';
}
function pcMoveRowHtml(m){
  var low=m.pp<=Math.max(1,Math.floor(m.maxPp*0.25))?' low':'';
  return '<div class="pc-moverow">'+
    '<span class="mtype" style="background:'+(TYPE_COLOR[m.type]||'#6b7280')+'">'+(typeShort(m.type)||'?')+'</span>'+
    '<span class="mname">'+esc(m.name)+'</span>'+
    '<span class="mpp'+low+'">'+m.pp+'/'+m.maxPp+'</span>'+
  '</div>';
}
// z1 对手6只（竖排6行）
function oppRowHtml(p){
  var hc=hpColors(p.hpPct||0);
  var cls='team-row'+(p.active?' active':'')+(!p.revealed?' unknown':'')+(p.ko?' ko':'');
  var bg=p.status?(' style="background:'+STATUS[p.status].bg+'"'):'';
  var name=p.name||'???';
  var inner;
  if(!p.revealed){ inner='<span class="tr-name" style="color:var(--faint)">???</span><span></span><span class="tr-pct" style="color:var(--faint);font-size:11px">未露</span><span></span>'; }
  else if(p.ko){ inner='<span class="tr-name">'+esc(name)+'</span><span></span><span class="tr-pct" style="color:var(--faint)">KO</span><span></span>'; }
  else { inner='<span class="tr-name">'+esc(name)+'</span><div class="tr-hpbar"><i data-pct="'+p.hpPct+'" style="background:'+hc[0]+'"></i></div><span class="tr-pct" style="color:'+hc[0]+'">'+p.hpPct+'%</span>'+statusDot(p.status); }
  return '<div class="'+cls+'"'+bg+'>'+inner+'</div>';
}
// z4 我方6只（竖排6行 + 4招）
function meBenchHtml(p){
  var hc=hpColors(p.hpPct||0);
  var pctTxt=p.ko?'KO':(p.hpPct+'%');
  var st=p.status?(' style="background:'+STATUS[p.status].bg+'"'):'';
  return '<div class="bench-poke'+(p.ko?' ko':'')+(p.active?' active':'')+'"'+st+'>'+
    '<div class="bp-left">'+
      '<div class="bp-name">'+esc(p.name)+'</div>'+
      '<div class="bp-hp"><div class="bp-hpbar"><i data-pct="'+(p.hpPct||0)+'" style="background:'+hc[0]+'"></i></div><span class="bp-pct" style="color:'+hc[0]+'">'+pctTxt+'</span></div>'+
    '</div>'+
    (p.moves?'<div class="bp-moves">'+p.moves.map(moveMiniHtml).join('')+'</div>':'')+
  '</div>';
}
// 分隔条：FOE 右上 / 中 Turn天气场地 / ME 左下
function dividerHtml(s){
  var w=s.weather?WEATHER[s.weather]:null;
  var t=s.terrain?TERRAIN[s.terrain]:null;
  return '<div class="d-top">'+
      '<span class="side"><span class="lbl">FOE场</span>'+hazardsHtml(s.opp.hazards)+'</span>'+
      '<span class="foe">'+esc(s.oppPlayer||'FOE')+'</span>'+
    '</div>'+
    '<div class="d-mid">'+
      '<span class="turn"><span class="lbl">TURN</span>'+String(s.turn).padStart(2,"0")+'</span>'+
      '<span><span class="k">天气</span><b class="weather">'+(w?w.cn:'—')+'</b></span>'+
      '<span><span class="k">场地</span><b class="terrain">'+(t?t.cn:'—')+'</b></span>'+
    '</div>'+
    '<div class="d-bot">'+
      '<span class="me">'+esc(s.mePlayer||'ME')+'</span>'+
      '<span class="side"><span class="lbl">ME场</span>'+hazardsHtml(s.me.hazards)+'</span>'+
    '</div>';
}

function render(s){
  document.getElementById('divider').innerHTML=dividerHtml(s);

  var opp6=[{name:s.opp.active.name,hpPct:s.opp.active.hpPct,status:s.opp.active.status,ko:s.opp.active.hpPct===0,active:true,revealed:true}];
  opp6=opp6.concat(s.opp.bench.map(function(b){return {name:b.name,hpPct:b.hpPct,status:b.status||null,ko:b.ko,active:false,revealed:b.revealed};}));
  var me6=[{name:s.me.active.name,hp:s.me.active.hp,maxHp:s.me.active.maxHp,hpPct:s.me.active.hpPct,status:s.me.active.status,ko:s.me.active.hpPct===0,moves:s.me.active.moves,active:true}];
  me6=me6.concat(s.me.bench.map(function(b){return {name:b.name,hp:b.hp,maxHp:b.maxHp,hpPct:b.hpPct,status:b.status,ko:b.ko,moves:b.moves,active:false};}));

  document.getElementById('z1').innerHTML='<div class="pcards">'+opp6.map(function(p){return pcCardHtml(p,false);}).join('')+'</div>';
  document.getElementById('z2').innerHTML=fieldCardHtml(s.opp.active, false);
  document.getElementById('z3').innerHTML=fieldCardHtml(s.me.active, true);
  document.getElementById('z4').innerHTML='<div class="pcards">'+me6.map(function(p){return pcCardHtml(p,true);}).join('')+'</div>';

  setTimeout(function(){
    document.querySelectorAll('[data-pct]').forEach(function(el){
      el.style.width=(el.getAttribute('data-pct')||0)+'%';
    });
  },80);
}

// ===== 演示播放器 =====
var curStep=0, playing=false, timer=null, STEP_MS=2400;
function updatePlayBtn(){ var b=document.getElementById('btnPlay'); if(b) b.textContent=playing?'PAUSE':'PLAY'; }
function showStep(i){
  curStep=i;
  render(DEMO_SCRIPT[i]);
  var info=document.getElementById('stepInfo');
  if(info) info.textContent=(i+1)+' / '+DEMO_SCRIPT.length;
}
function nextStep(){ if(curStep<DEMO_SCRIPT.length-1) showStep(curStep+1); else pauseDemo(); }
function playDemo(){
  if(playing) return;
  if(curStep>=DEMO_SCRIPT.length-1) showStep(0);
  playing=true; updatePlayBtn();
  timer=setInterval(nextStep,STEP_MS);
}
function pauseDemo(){ playing=false; if(timer){clearInterval(timer);timer=null;} updatePlayBtn(); }
function togglePlay(){ if(playing) pauseDemo(); else playDemo(); }
function replayDemo(){ pauseDemo(); showStep(0); playDemo(); }
document.getElementById('btnPlay').onclick=togglePlay;
document.getElementById('btnReplay').onclick=replayDemo;

// ===== live mode: EventSource 接真实 PO 数据，连上则停 demo =====
var usingLive=false;
function setLiveMode(on){
  usingLive=on;
  var c=document.querySelector('.controls');
  if(c) c.style.display=on?'none':'';
  var t=document.querySelector('.preview-tag');
  if(t){ t.textContent=on?'LIVE · 实时':'DEMO · SIMULATED'; t.style.display=on?'none':'flex'; }
}
function connectLive(){
  if(!window.EventSource) return;
  var es;
  try{ es=new EventSource('/events'); }catch(e){ return; }
  es.onmessage=function(ev){
    try{
      var s=JSON.parse(ev.data);
      pauseDemo();
      setLiveMode(true);
      render(s);
    }catch(err){}
  };
}
showStep(0);
playDemo();
connectLive();
</script>
